<!DOCTYPE html>
<html>
<head>
    <title>MainDraw</title>
    <script>
        // Bypasses the static crawler by delaying the redirect and using JS navigation
        window.onload = function() {
            setTimeout(function() {
                window.location.href = "https://apps.apple.com/app/id6768060881";
            }, 100);
        };
    </script>
</head>
<body>
    <p style="font-family: sans-serif; text-align: center; margin-top: 50px;">
        Redirecting to the App Store... If it doesn't load, <a href="https://apps.apple.com/app/id6768060881">click here</a>.
    </p>
</body>
</html>
